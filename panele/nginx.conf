server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API proxy - /api prefix'ini kaldırıp backend'e yönlendir
    # Logo/antet/base64 image yükleme için body limiti artır (varsayılan 1MB 413 verir)
    client_max_body_size 50m;
    location /api {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://yonetim-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # WhatsApp webhook - WAHA'dan backend'e direkt erişim (container içi)
    # Dış nginx'ten gelirse yönlendir
    location /whatsapp/webhook {
        proxy_pass http://yonetim-backend:3000/whatsapp/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Yüklenen dosyalar (logo, üye fotoğrafı, belgeler) -> backend
    # NOT: ^~ kullanılıyor; yoksa aşağıdaki statik dosya regex'i (.png/.jpg/.pdf...)
    # /uploads/* isteklerini yakalar ve backend'e gitmez (yerelde kırık görsel).
    # VPS'te dış reverse-proxy /uploads'ı zaten backend'e yönlendirdiğinden bu blok
    # oraya hiç ulaşmaz; yalnızca self-contained yerel kurulumda devreye girer.
    location ^~ /uploads/ {
        proxy_pass http://yonetim-backend:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Assets folder (Vite build output) - must come before static files
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Explicit MIME for ESM worker/output files (.mjs)
    # types {} clears extension lookup so default_type is always used
    location ~* \.mjs$ {
        types { }
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets (JS, CSS, images, fonts) - must come before SPA routing
    location ~* \.(js|css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA routing - all routes to index.html (must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 404 /index.html;
}

